version: '3.8'

# 乳腺癌 AI 辅助诊断系统 Docker Compose 配置
# 包含：PostgreSQL + Backend + Frontend + Redis

services:
  # ============================================
  # PostgreSQL 数据库
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: breast-ai-db
    restart: always
    environment:
      POSTGRES_DB: breast_ai_db
      POSTGRES_USER: breast_ai_user
      POSTGRES_PASSWORD: breast_ai_secure_password_2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U breast_ai_user -d breast_ai_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - breast-ai-network

  # ============================================
  # Redis 缓存 (可选)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: breast-ai-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - breast-ai-network

  # ============================================
  # 后端服务
  # ============================================
  backend:
    build:
      context: ../../backend
      dockerfile: ../deploy/docker/Dockerfile
    container_name: breast-ai-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://breast_ai_user:breast_ai_secure_password_2026@postgres:5432/breast_ai_db
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      DEBUG: "false"
      ALLOWED_HOSTS: "*"
    volumes:
      - ../../backend:/app
      - ../../models:/app/models
      - ../../data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - breast-ai-network

  # ============================================
  # 前端服务
  # ============================================
  frontend:
    build:
      context: ../../frontend
      dockerfile: ../deploy/docker/Dockerfile
    container_name: breast-ai-frontend
    restart: always
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://backend:8000
      NODE_ENV: production
    volumes:
      - ../../frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    networks:
      - breast-ai-network

# ============================================
# 数据卷
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ============================================
# 网络
# ============================================
networks:
  breast-ai-network:
    driver: bridge
