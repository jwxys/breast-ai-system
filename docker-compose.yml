version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:14-alpine
    container_name: breast-ai-db
    environment:
      POSTGRES_DB: breast_ai
      POSTGRES_USER: breast_ai_user
      POSTGRES_PASSWORD: breast_ai_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U breast_ai_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: breast-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 数据库初始化
  db-init:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: breast-ai-db-init
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: breast_ai
      POSTGRES_USER: breast_ai_user
      POSTGRES_PASSWORD: breast_ai_password
    command: >
      sh -c "
        echo '等待 PostgreSQL 就绪...' &&
        until pg_isready -h postgres -p 5432 -U breast_ai_user; do
          sleep 1
        done &&
        echo 'PostgreSQL 已就绪，执行初始化...' &&
        python scripts/init_db.py
      "
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: breast-ai-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://breast_ai_user:breast_ai_password@postgres:5432/breast_ai
      REDIS_URL: redis://redis:6379/0
      DEBUG: "true"
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: breast-ai-frontend
    ports:
      - "3000:80"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend

  # MinIO 对象存储（兼容 S3）
  minio:
    image: minio/minio:latest
    container_name: breast-ai-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
  upload_data:
